<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebSocket Terminal</title>
    <style>
        body {
            background-color: #000;
            color: #00FF00;
            font-family: monospace;
            padding: 20px;
        }
        #terminal {
            width: 100%;
            height: 70vh;
            overflow-y: scroll;
            white-space: pre-wrap;
            border: 1px solid #00FF00;
        }
        #inputLine {
            display: flex;
            align-items: center;
        }
        #inputPrompt {
            margin-right: 10px;
        }
        #inputField {
            flex: 1;
            background: none;
            border: none;
            color: #00FF00;
            font-family: monospace;
            resize: none;
            overflow: hidden;
        }
        p{
            margin: 0;
        }
        #terminal div{
            margin-top:-0.5rem;
        }
        #ipAddress {
            margin-top: 10px;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div id="terminal"><p style="margin: 15px;"></p></div>
    <div id="inputLine">
        <span id="inputPrompt">></span>
        <textarea id="inputField" autocomplete="off" rows="1"></textarea>
    </div>    
    <div id="ipAddress" style="display: none;"></div>

    <script>
        const terminal = document.querySelector('#terminal p');
        const inputField = document.getElementById('inputField');
        const htmlTitle = document.querySelector('title');
        const ipAddress = document.getElementById('ipAddress');
        const info = [
            "Welcome to terminal.",
            "If you cannot connect to the server, probably the WebSocket server is off.",
            "Also, only IP from China(mainland) is accepted."
        ];
        var nick = localStorage.getItem('nick') || '';
        var enteredNick = false;
        var unreadMsgNum = 0;
        var windowStatus = 'focus';
        let titleText = 'WebSocket Terminal';
        let ws;
        let messageHistory = [];
        let historyIndex = -1;

        htmlTitle.innerText = titleText;
        window.onfocus = function() {
            htmlTitle.innerText = titleText;
            windowStatus = 'focus';
            unreadMsgNum = 0;
        };
        window.onblur = function() {
            windowStatus = 'blur';
        };

        function showInfo() {
            for (let key in info) {
                appendToTerminal(info[key]);
            }
        }

        function unicode2Ch(str) {
            if (!str) {
                return;
            }
            var len = 1;
            var result = '';
            for (var i = 0; i < str.length; i = i + len) {
                len = 1;
                var temp = str.charAt(i);
                if (temp == '\\') {
                    if (str.charAt(i + 1) == 'u') {
                        var unicode = str.substr((i + 2), 4); 
                        result += String.fromCharCode(parseInt(unicode, 16).toString(10));
                        len = 6;
                    } else {
                        result += temp;
                    }
                } else {
                    result += temp;
                }
            }
            return result;
        }

        function connectWebSocket() {
            ws = new WebSocket('ws://39.105.127.10:6022');

            ws.onmessage = function(event) {
                let message = event.data;
                if(message !== ""){
                    appendToTerminal(`<<< ${message.slice(1,-1)}`);
                }

                if (windowStatus == 'blur') {
                    unreadMsgNum = unreadMsgNum + 1;
                    htmlTitle.innerText = `(${unreadMsgNum}) ${titleText}`;
                }
            };

            ws.onopen = function() {
                appendToTerminal('Connected to server.');
                appendToTerminal('Please enter a nickname at bottom first. This nickname will be visible to all.');
                document.getElementById('inputField').value = nick;

            };


            ws.onclose = function() {
                enteredNick = false;
                appendToTerminal('Disconnected from server. Reconnecting in 5 seconds...');
                setTimeout(connectWebSocket, 5000);
            };

            ws.onerror = function(error) {
                appendToTerminal(`WebSocket error: ${error.message}`);
            };
        }
        
        inputField.addEventListener('keydown', function(event) {
            if (event.key === 'Enter' && !event.ctrlKey) {
                event.preventDefault();
                const message = inputField.value;
                if (message.trim() !== '') {
                    if (!enteredNick) {
                        nick = message;
                        localStorage.setItem('nick', nick);
                        enteredNick = true;
                        document.getElementById('inputField').value = '';
                        // 发送用户名给服务器
                    const nameMessage = JSON.stringify({ name: nick });
                    ws.send(nameMessage);
                        appendToTerminal(`Successfully set nickname "${nick}". Have a nice chat!`);
                        return true;
                    }
                    const formattedMessage = {
                        sender: nick,
                        tripcode: ipAddress.innerText,
                        msg: message
                    };
                    ws.send(JSON.stringify(formattedMessage));
                    messageHistory.push(message);
                    historyIndex = messageHistory.length;
                    inputField.value = '';
                    inputField.rows = 1; // 重置行数
                }
            } else if (event.key === 'Enter' && event.ctrlKey) {
                inputField.value += '\n';
                adjustTextareaHeight(inputField);
            } else if (event.key === 'ArrowUp') {
                if (historyIndex > 0) {
                    historyIndex--;
                    inputField.value = messageHistory[historyIndex];
                    adjustTextareaHeight(inputField);
                }
            } else if (event.key === 'ArrowDown') {
                if (historyIndex < messageHistory.length - 1) {
                    historyIndex++;
                    inputField.value = messageHistory[historyIndex];
                    adjustTextareaHeight(inputField);
                } else {
                    inputField.value = '';
                    historyIndex = messageHistory.length;
                    adjustTextareaHeight(inputField);
                }
            }
        });

        function adjustTextareaHeight(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = (textarea.scrollHeight) + 'px';
        }

        inputField.addEventListener('input', function() {
            adjustTextareaHeight(inputField);
        });

        function escapeHTML(html) {
            var text = document.createTextNode(html);
            var p = document.createElement('p');
            p.appendChild(text);
            return p.innerHTML;
        }

        function appendToTerminal(message) {
            message = escapeHTML(message.replace(/\\\\/g, '\\').replace(/\\"/g, '"').replace(/\\n/g, '  \n'));
            const msgCN = unicode2Ch(message);
            const formattedMessage = marked.parse(msgCN, { sanitize: true });
            const div = document.createElement('div');
            div.innerHTML = formattedMessage;
            terminal.appendChild(div);
            div.scrollIntoView({ behavior: 'smooth' });
        }


        const observer = new MutationObserver(() => {
            const lastChild = terminal.lastElementChild;
            if (lastChild) {
                lastChild.scrollIntoView({ behavior: 'smooth' });
            }
        });
        observer.observe(terminal, { childList: true, subtree: true });

        // Fetch public IP address
        async function fetchPublicIP() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                ipAddress.textContent = `${data.ip}`;
            } catch (error) {
                ipAddress.textContent = 'Could not fetch public IP address.';
            }
        }

        showInfo();
        fetchPublicIP();
        connectWebSocket();
    </script>
</body>
</html>
